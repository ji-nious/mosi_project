<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관광 정보</title>

  <!-- 기본 CSS -->
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/information/restaurants.css}">

  <!-- 폰트 및 아이콘 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.8/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
<div class="layout-wrapper">
  <header th:replace="~{fragments/header :: header}"></header>

  <div class="page-container">
    <main class="mypage-container">
      <!-- ==================== 사이드바 ==================== -->
      <aside class="sidebar">
        <div class="sidebar-card">
          <nav class="mypage-nav">
            <div class="nav-title">관광 정보</div>
            <ul>
              <li><a href="/information" class="active">부산맛집</a></li>
              <li><a href="#" onclick="alert('준비중입니다.')">교통약자 편의시설</a></li>
            </ul>
          </nav>
        </div>
      </aside>

      <!-- ==================== 메인 컨텐츠 ==================== -->
      <section class="content">
        <div class="content-header">
          <h1>관광 정보</h1>
          <p>부산의 관광정보를 찾아보세요</p>
        </div>

        <!-- 대시보드 -->
        <section class="dashboard-section">
          <div class="dashboard-container">
            <h2 class="section-title">부산맛집</h2>

            <!-- 필터 -->
            <div class="filter-container">
              <select id="districtFilter" class="filter-select">
                <option value="">전체 지역</option>
                <option th:each="district : ${districts}"
                        th:value="${district}"
                        th:text="${district}"
                        th:selected="${district == selectedDistrict}">지역명</option>
              </select>

              <select id="categoryFilter" class="filter-select">
                <option value="">전체 카테고리</option>
                <option th:each="category : ${categories}"
                        th:value="${category}"
                        th:text="${category}"
                        th:selected="${category == selectedCategory}">카테고리</option>
              </select>

              <button type="button" id="filterBtn" class="btn-primary">검색</button>
            </div>

            <!-- Kibana 대시보드 -->
            <div class="dashboard-content">
              <div class="map-container" style="grid-column: 1 / -1;">
                <h3>부산 맛집 분석 대시보드</h3>
                <div id="kibanaContainer">
                  <iframe
                      id="kibanaFrame"
                      src="http://localhost:5601/app/dashboards#/view/5beffe3b-f70b-4976-acee-277da4d07cf2?embed=true&_g=(refreshInterval:(pause:!t,value:60000),time:(from:now-15m,to:now))&hide-filter-bar=true"
                      width="100%"
                      height="600"
                      style="border: 1px solid #ddd; border-radius: 6px;">
                  </iframe>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 맛집 목록 -->
        <section class="restaurant-list-section">
          <div class="section-header">
            <h2 class="section-title">맛집 목록</h2>
          </div>

          <!-- 맛집 카드 그리드 -->
          <div class="restaurant-grid" id="restaurantGrid">
            <!-- 디버깅용 메시지 -->
            <div th:if="${restaurants.content.size() == 0}" class="debug-message">
              <p style="text-align: center; padding: 40px; background: #f8f9fa; border-radius: 8px; color: #666;">
                맛집 데이터가 없습니다. (총 데이터: <span th:text="${restaurants.totalElements}">0</span>개)
              </p>
            </div>
            
            <div th:each="restaurant : ${restaurants.content}" class="restaurant-card">
              <div class="restaurant-image">
                <img th:src="${restaurant.mainImgThumb != null ? restaurant.mainImgThumb : '/img/default-restaurant.png'}"
                     th:alt="${restaurant.mainTitle}"
                     onerror="this.src='/img/default-restaurant.png'">
                <div class="restaurant-badge" th:if="${restaurant.gugunNm}" th:text="${restaurant.gugunNm}">지역</div>
              </div>

              <div class="restaurant-info">
                <h3 class="restaurant-name" th:text="${restaurant.mainTitle}">맛집명</h3>
                <p class="restaurant-address" th:text="${restaurant.addr1}">주소</p>
                <p class="restaurant-menu" th:if="${restaurant.rprsnTvMenu}" th:text="${restaurant.rprsnTvMenu}">대표메뉴</p>

                <div class="restaurant-actions">
                  <a th:href="@{'/information/restaurants/' + ${restaurant.ucSeq}}" class="btn-detail">상세보기</a>
                </div>
              </div>
            </div>
          </div>

          <!-- 페이징 -->
          <div class="pagination-container" th:if="${restaurants.totalPages > 1}">
            <div class="pagination">
              <a th:if="${currentPage > 1}"
                 th:href="@{/information(page=${currentPage - 1}, district=${selectedDistrict}, category=${selectedCategory})}"
                 class="page-btn">이전</a>

              <span th:each="page : ${#numbers.sequence(1, restaurants.totalPages)}"
                    th:class="${page == currentPage ? 'page-btn active' : 'page-btn'}">
                  <a th:if="${page != currentPage}"
                     th:href="@{/information(page=${page}, district=${selectedDistrict}, category=${selectedCategory})}"
                     th:text="${page}">1</a>
                  <span th:if="${page == currentPage}" th:text="${page}">1</span>
                </span>

              <a th:if="${currentPage < restaurants.totalPages}"
                 th:href="@{/information(page=${currentPage + 1}, district=${selectedDistrict}, category=${selectedCategory})}"
                 class="page-btn">다음</a>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>

<!-- JavaScript -->
<script th:inline="javascript">
  // 서버에서 전달된 데이터
  /*<![CDATA[*/
  const dashboardData = /*[[${dashboardData}]]*/ {};
  /*]]>*/
</script>
<script th:src="@{/js/information/restaurants.js}"></script>
</body>
</html>
