<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부산 맛집 가이드 - MO:SI</title>

  <!-- 외부 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

  <!-- 레이아웃(헤더·푸터) -->
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <!-- 공통 컴포넌트(UI, 사이드바 등) -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/information/restaurants.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="layout-wrapper">
  <!-- 기존 홈페이지와 동일한 헤더 -->
  <header th:replace="~{fragments/header :: header}"></header>
  
  <!-- ========================= MAIN LAYOUT ========================= -->
  <div class="page-container">
    <main class="mypage-container">
              <!-- ---------- 사이드바 ---------- -->
        <aside class="sidebar">
          <div class="sidebar-card">
            <nav class="mypage-nav">
              <div class="nav-title active">관광 정보</div>
              <ul>
                <li><a th:href="@{/information/restaurants}">맛집 정보</a></li>
                <li><a href="#" onclick="alert('준비중입니다.')">관광지 정보</a></li>
                <li><a href="#" onclick="alert('준비중입니다.')">장애인 정보</a></li>
              </ul>
            </nav>
          </div>
        </aside>
      
      <!-- ---------- 본문 영역 ---------- -->
      <section class="content">
        <div class="community-wrapper restaurants-content">

<!-- 대시보드 -->
<section class="dashboard">
  <div class="dashboard-container">
    <h1 class="dashboard-title">부산 맛집 현황 대시보드</h1>
    <div class="dashboard-content">
      <!-- 지도 컨테이너 -->
      <div class="map-container">
        <div class="map-header">
          <div class="map-title">부산 맛집 위치 분포</div>
          <div class="map-stats">총 447개 맛집</div>
        </div>
        <div id="map"></div>
      </div>

      <!-- 사이드바 -->
      <div class="sidebar">
        <!-- 구군별 도넛 차트 -->
        <div class="chart-container">
          <div class="chart-title">🏙️ 구군별 분포</div>
          <div class="donut-chart">
            <canvas id="districtChart"></canvas>
          </div>
        </div>

        <!-- 업종별 바 차트 -->
        <div class="chart-container">
          <div class="chart-title">🍴 주요 업종 현황</div>
          <div class="bar-chart">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- 필터 섹션 -->
<section class="filter-section">
  <div class="filter-container">
    <div class="filter-group">
      <label class="filter-label">지역</label>
      <select class="filter-select" id="districtFilter">
        <option value="">전체 지역</option>
        <option value="해운대구">해운대구</option>
        <option value="부산진구">부산진구</option>
        <option value="중구">중구</option>
        <option value="서구">서구</option>
        <option value="동래구">동래구</option>
        <option value="수영구">수영구</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">업종</label>
      <select class="filter-select" id="categoryFilter">
        <option value="">전체 업종</option>
        <option value="한식">한식</option>
        <option value="일식">일식</option>
        <option value="중식">중식</option>
        <option value="양식">양식</option>
        <option value="카페">카페</option>
        <option value="치킨">치킨</option>
      </select>
    </div>
    <div class="filter-buttons">
      <button class="btn btn-primary" onclick="applyFilters()">필터 적용</button>
      <button class="btn btn-secondary" onclick="resetFilters()">초기화</button>
    </div>
  </div>
</section>

<!-- 맛집 목록 -->
<section class="content-section">
  <h2 class="section-title">맛집 목록</h2>
  <div class="restaurant-grid" id="restaurantGrid">
    <!-- 맛집 카드들이 여기에 동적으로 생성됩니다 -->
  </div>

  <!-- 페이징 -->
  <div class="pagination" id="pagination">
    <button class="page-btn" onclick="changePage('first')">처음</button>
    <button class="page-btn" onclick="changePage('prev')">이전</button>
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">3</button>
    <button class="page-btn" onclick="changePage('next')">다음</button>
    <button class="page-btn" onclick="changePage('last')">마지막</button>
  </div>
</section>

        </div>
      </section>
    </main>
  </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>

<!-- 로컬 JavaScript -->
<script th:src="@{/js/information/restaurants.js}"></script>
</body>
</html>
